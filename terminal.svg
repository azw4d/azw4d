        <text class="r8" x="468" y="184"><tspan fill="#3e3e42">.</tspan></text>

        <text class="r9" x="468" y="200"><tspan fill="#ffc914">. </tspan><tspan fill="#ffc914">Frameworks</tspan><tspan fill="#e1e8ed">: </tspan><tspan fill="#3e3e42">........................... </tspan><tspan fill="#e1e8ed">Node.js, Express.js, Flask</tspan></text>
        <text class="r10" x="468" y="216"><tspan fill="#3e3e42">. </tspan><tspan fill="#ffc914">          </tspan><tspan fill="#e1e8ed">  </tspan><tspan fill="#3e3e42">....................................... </tspan><tspan fill="#e1e8ed">Socket.io, Electron.js, EJS</tspan></text>
        <text class="r11" x="468" y="232"><tspan fill="#ffc914">. </tspan><tspan fill="#ffc914">Database</tspan><tspan fill="#e1e8ed">: </tspan><tspan fill="#3e3e42">............................. </tspan><tspan fill="#e1e8ed">MongoDB, Firebase</tspan></text>
        
        <text class="r12" x="468" y="248"><tspan fill="#3e3e42">.</tspan></text>

        <text class="r13" x="468" y="264"><tspan fill="#ffc914">. </tspan><tspan fill="#ffc914">Cloud</tspan><tspan fill="#e1e8ed">: </tspan><tspan fill="#3e3e42">................................ </tspan><tspan fill="#e1e8ed">GCP  (Google Cloud),  Azure</tspan></text>
