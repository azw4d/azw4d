        <text class="r1" x="468" y="72"><tspan fill="#ffc914">. </tspan><tspan fill="#ffc914">OS</tspan><tspan fill="#e1e8ed">: </tspan><tspan fill="#3e3e42">................................... </tspan><tspan fill="#e1e8ed">Linux  ·  Windows  ·  Android</tspan></text>
        <text class="r2" x="468" y="88"><tspan fill="#ffc914">. </tspan><tspan fill="#ffc914">Uptime</tspan><tspan fill="#e1e8ed">: </tspan><tspan fill="#3e3e42">............................... </tspan><tspan fill="#e1e8ed">5 years, 4 months and 3 days</tspan></text>
        <text class="r3" x="468" y="104"><tspan fill="#ffc914">. </tspan><tspan fill="#ffc914">Status</tspan><tspan fill="#e1e8ed">: </tspan><tspan fill="#3e3e42">............................... </tspan><tspan fill="#e1e8ed">Student</tspan></text>
        
        <text class="r5" x="468" y="120"><tspan fill="#3e3e42">.</tspan></text>

        <text class="r6" x="468" y="136"><tspan fill="#ffc914">. </tspan><tspan fill="#ffc914">Languages.Programming</tspan><tspan fill="#e1e8ed">: </tspan><tspan fill="#3e3e42">................ </tspan><tspan fill="#e1e8ed">Python, JavaScript, C, Bash</tspan></text>
        <text class="r7" x="468" y="152"><tspan fill="#ffc914">. </tspan><tspan fill="#ffc914">Languages.Web</tspan><tspan fill="#e1e8ed">: </tspan><tspan fill="#3e3e42">........................ </tspan><tspan fill="#e1e8ed">HTML, CSS, JSON</tspan></text>
