    <g style="animation:fadeIn 0.6s ease both;animation-delay:5.100s;opacity:0">
        <text class="r0" x="24" y="56" fill="#e1e8ed">.  <tspan fill="#179ff1">$ git</tspan> clone https://github.com/azw4d/azw4d.git</text>
        <text class="r1" x="24" y="72" fill="#e1e8ed">.  <tspan fill="#179ff1">$ cd</tspan> azw4d</text>
        <text class="r2" x="24" y="88" fill="#e1e8ed">.  <tspan fill="#179ff1">$ npm</tspan> install</text>
        <text class="r3" x="24" y="104" fill="#e1e8ed">.  <tspan fill="#179ff1">$ npm</tspan> run build</text>
        <text class="r4" x="24" y="120" fill="#e1e8ed">.  <tspan fill="#179ff1">$ npm</tspan> <tspan fill="#ffc914">start</tspan></text>
        <text class="r5" x="24" y="136" fill="#e1e8ed">.  </text>
        <text class="r6" x="24" y="152" fill="#e1e8ed">.  [init] loading profile metadata...</text>
        <text class="r7" x="24" y="168" fill="#e1e8ed">.  [info] checking environment variables</text>
        <text class="r8" x="24" y="184" fill="#e1e8ed">.  [ok] <tspan fill="#179ff1">NODE_ENV</tspan>=<tspan fill="#ffc914">production</tspan> </text>
        <text class="r9" x="24" y="200" fill="#e1e8ed">.  [ok] <tspan fill="#179ff1">PORT</tspan>=<tspan fill="#ffc914">443</tspan> </text>
        <text class="r10" x="24" y="216" fill="#e1e8ed">.  </text>
        <text class="r11" x="24" y="232" fill="#e1e8ed">.  Welcome to my profile!</text>
        <text class="r12" x="24" y="248" fill="#e1e8ed">. </text>
        <text class="r13" x="24" y="264" fill="#e1e8ed">. <tspan fill="#179ff1">$ tail</tspan> <tspan fill="#ffc914">-f</tspan> logs/server.log</text>
        <text class="r14" x="24" y="280" fill="#e1e8ed">. [INFO] API request GET /azw4d</text>
        <text class="r15" x="24" y="296" fill="#e1e8ed">. [200] 15ms</text>

        <rect x="24" y="300" width="7" height="13" fill="#e1e8ed" style="animation:blink 1.1s step-start infinite;animation-delay:8.100s;opacity:0"/>

